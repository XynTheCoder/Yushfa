<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Ma's Organics</title>
<link rel="icon" href="Logo.png">

<style>
body{
margin:0;
font-family:sans-serif;
background:#0a0a0a;
color:white;
}

.view{display:none;padding:20px;}
.active{display:block;}

.back{
margin-bottom:15px;
padding:10px;
border:1px solid gold;
display:inline-block;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background:#141414;
padding:10px;
border-radius:10px;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.cart-card{
display:flex;
gap:10px;
margin-bottom:10px;
}

.float{
position:fixed;
bottom:20px;
right:20px;
background:gold;
padding:15px;
border-radius:50%;
cursor:pointer;
color:black;
}

.badge{
background:red;
color:white;
border-radius:50%;
padding:2px 6px;
font-size:12px;
position:absolute;
}

.btn{
width:100%;
padding:12px;
background:gold;
border:none;
cursor:pointer;
}

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:#111;
padding:20px;
border-radius:10px;
width:90%;
max-width:300px;
}
</style>

</head>

<body>

<!-- HOME -->
<div id="home" class="view active">
<h1>My Ma's Organics</h1>
<button onclick="go('menu')">Shop</button>
</div>

<!-- MENU -->
<div id="menu" class="view">
<div class="back" onclick="go('home')">Back</div>
<div class="grid" id="products"></div>
</div>

<!-- CART -->
<div id="cart" class="view">
<div class="back" onclick="go('menu')">Back</div>

<h2>Your Order</h2>
<div id="cartItems"></div>

<textarea id="notes" placeholder="Notes"></textarea>
<input id="address" placeholder="Delivery Address">

<h3>Total: KES <span id="total">0</span></h3>

<button class="btn" onclick="showPopup()">Place Order</button>
</div>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h3>Send via WhatsApp</h3>

<button onclick="hidePopup()">Cancel</button>
<button onclick="checkout()">Proceed</button>
</div>
</div>

<!-- FLOAT CART -->
<div class="float" onclick="go('cart')">
🛒 <span id="count">0</span>
</div>

<script>

const products=[
{id:1,name:"HYPERTENSION",price:800,img:"1.png"},
{id:2,name:"BLOOD SUGAR",price:800,img:"2.png"},
{id:3,name:"HORMONAL BALANCE",price:800,img:"3.png"},
{id:4,name:"OVERALL WELLBEING",price:800,img:"4.png"},
{id:5,name:"INFLAMMATION",price:800,img:"5.jpg"},
{id:6,name:"SKIN",price:800,img:"6.jpg"},
{id:7,name:"SLEEP",price:800,img:"PRODUCT.png"}
];

let cart={}, currentId=null;

function go(id){
document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
document.getElementById(id).classList.add('active');

if(id==='menu') loadProducts();
if(id==='cart') updateCart();
}

function loadProducts(){
let html='';
products.forEach(p=>{
let qty=cart[p.id]||0;

html+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>KES ${p.price}</p>
<button onclick="changeQty(${p.id},-1)">-</button>
${qty}
<button onclick="changeQty(${p.id},1)">+</button>
</div>`;
});

products.innerHTML=html;
}

function changeQty(id,val){
cart[id]=(cart[id]||0)+val;
if(cart[id]<=0) delete cart[id];

loadProducts();
updateCart();
}

function updateCart(){
let html='', total=0, count=0;

for(let id in cart){
let p=products.find(x=>x.id==id);
let qty=cart[id];

total+=p.price*qty;
count+=qty;

html+=`
<div class="cart-card">
${p.name} x${qty}
<button onclick="changeQty(${p.id},-1)">-</button>
<button onclick="changeQty(${p.id},1)">+</button>
</div>`;
}

cartItems.innerHTML=html;
totalEl.innerText=total;
countEl.innerText=count;
}

function showPopup(){
if(Object.keys(cart).length===0){
alert("Cart is empty");
return;
}
popup.style.display="flex";
}

function hidePopup(){
popup.style.display="none";
}

function checkout(){

hidePopup();

let msg="NEW ORDER\n";
let total=0;

for(let id in cart){
let p=products.find(x=>x.id==id);
let qty=cart[id];

total+=p.price*qty;
msg+=`${p.name} x${qty}\n`;
}

msg+=`\nTotal: KES ${total}`;
msg+=`\nAddress: ${address.value}`;
msg+=`\nNotes: ${notes.value}`;

window.open(`https://wa.me/254713802224?text=${encodeURIComponent(msg)}`,'_blank');

alert("Order Sent!");

cart={};
notes.value="";
address.value="";

updateCart();
go('home');
}

const cartItems=document.getElementById('cartItems');
const totalEl=document.getElementById('total');
const countEl=document.getElementById('count');
const productsEl=document.getElementById('products');

</script>

</body>
</html>
